name: IncidentFlow CI

on:
  push:
    branches:
      - main
      - master
  pull_request:

jobs:
  verify:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: |
            backend/package-lock.json
            frontend/package-lock.json

      - name: Install backend dependencies
        run: npm ci --prefix backend

      - name: Install frontend dependencies
        run: npm ci --prefix frontend

      - name: Run backend coverage suite
        run: npm --prefix backend run test:ci

      - name: Run frontend test suite
        run: npm --prefix frontend run test:ci

      - name: Build frontend bundle
        run: npm --prefix frontend run build

      - name: Upload backend coverage artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: backend-coverage
          path: backend/coverage
          if-no-files-found: warn

  docker-images:
    if: github.event_name == 'push' && (github.ref == 'refs/heads/main' || github.ref == 'refs/heads/master')
    needs: verify
    runs-on: ubuntu-latest
    env:
      DOCKERHUB_USERNAME: ${{ secrets.DOCKERHUB_USERNAME }}
      DOCKERHUB_TOKEN: ${{ secrets.DOCKERHUB_TOKEN }}

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Skip Docker publish when secrets are not configured
        if: env.DOCKERHUB_USERNAME == '' || env.DOCKERHUB_TOKEN == ''
        run: echo "Skipping Docker publish because DOCKERHUB_USERNAME or DOCKERHUB_TOKEN is not configured."

      - name: Log in to Docker Hub
        if: env.DOCKERHUB_USERNAME != '' && env.DOCKERHUB_TOKEN != ''
        uses: docker/login-action@v3
        with:
          username: ${{ env.DOCKERHUB_USERNAME }}
          password: ${{ env.DOCKERHUB_TOKEN }}

      - name: Build and push backend image
        if: env.DOCKERHUB_USERNAME != '' && env.DOCKERHUB_TOKEN != ''
        uses: docker/build-push-action@v5
        with:
          context: ./backend
          push: true
          tags: |
            docker.io/${{ env.DOCKERHUB_USERNAME }}/incidentflow-plus-backend:${{ github.sha }}
            docker.io/${{ env.DOCKERHUB_USERNAME }}/incidentflow-plus-backend:latest

      - name: Build and push frontend image
        if: env.DOCKERHUB_USERNAME != '' && env.DOCKERHUB_TOKEN != ''
        uses: docker/build-push-action@v5
        with:
          context: ./frontend
          push: true
          tags: |
            docker.io/${{ env.DOCKERHUB_USERNAME }}/incidentflow-plus-frontend:${{ github.sha }}
            docker.io/${{ env.DOCKERHUB_USERNAME }}/incidentflow-plus-frontend:latest
